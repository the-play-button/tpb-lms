# LMS Worker Configuration
# Deploy with: npx wrangler deploy

name = "lms-api"
main = "backend/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "lms-db"
database_id = "ef408d5f-f191-4743-98b5-cb73429c8283"

# Authentication configuration
[vars]
ACCESS_TEAM_DOMAIN = "theplaybutton"
BASTION_URL = "https://tpb-bastion-backend.matthieu-marielouise.workers.dev"
TELEMETRY_URL = "https://tpb-telemetry.matthieu-marielouise.workers.dev"
CF_ACCESS_CLIENT_ID = "1d40e1d5596067ac01ddca098c6396da.access"
# CF_ACCESS_CLIENT_SECRET — fetche depuis bastion vault au runtime (tpb/infra/cf_access_sa_client_secret)

# Secrets:
# - BASTION_TOKEN (sole bootstrap secret — fetched via wrangler secret put)
# All other secrets are fetched from bastion at runtime (see backend/handlers/content.js for github_pat_tpb_repos example).
#
# MIGRATED TO VAULT (fetch via VaultClient at runtime):
# - apps/lms/tally_webhook_secret (legacy: secret dans URL pour autoriser les webhooks Tally)
# - apps/lms/tally_signing_secret (recommandé: vérifie Tally-Signature HMAC-SHA256)
# - infra/cloudflare_stream_signing_key_id
# - infra/cloudflare_stream_signing_key_pem
# - infra/github_pat_tpb_repos (fine-grained GitHub PAT for content-handler)
#
# NOTE: Legacy wrangler secrets TALLY_* and CLOUDFLARE_STREAM_* can be removed
# once vault secrets are populated and code is updated to use VaultClient

# Development settings
[dev]
port = 8787
local_protocol = "http"

# Production environment
[env.production]
name = "lms-api"

# D1 Database binding for production
[[env.production.d1_databases]]
binding = "DB"
database_name = "lms-db"
database_id = "ef408d5f-f191-4743-98b5-cb73429c8283"

# Authentication configuration for production
[env.production.vars]
ACCESS_TEAM_DOMAIN = "theplaybutton"
BASTION_URL = "https://tpb-bastion-backend.matthieu-marielouise.workers.dev"
TELEMETRY_URL = "https://tpb-telemetry.matthieu-marielouise.workers.dev"
CF_ACCESS_CLIENT_ID = "1d40e1d5596067ac01ddca098c6396da.access"
# CF_ACCESS_CLIENT_SECRET — fetche depuis bastion vault au runtime (tpb/infra/cf_access_sa_client_secret)

# Staging environment  
[env.staging]
name = "lms-api-staging"
