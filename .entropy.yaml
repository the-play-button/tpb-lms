# LMS Project - Entropy Configuration
# Migrated from lms/scripts/entropy_check/config.py
# Usage: python -m tpb_sdk.entropy --path . --report

# Line count thresholds per file type
thresholds:
  backend: 500      # JS files in backend/
  frontend: 300     # JS files in frontend/
  css: 600          # CSS files (per module, after split)
  default: 500      # Other files

# Files/directories to ignore (extends defaults)
ignore:
  - vault-api       # Separate subproject with its own config

# OPT-OUT: LMS est un projet JS/Node classique sans DDD ni pipeline CHVHVCEF
tpb_checks:
  # Fleet-specific: pas pertinent
  fleet_queue_side_effect_inline: false
  fleet_websocket_auth_missing: false
  fleet_do_notification_missing: false
  # COCK Python testing: pas pertinent
  pytest_bdd_structure: false
  test_inline_construction: false
  mock_runner_detection: false
  domain_function_throw: false
  # COCK-specific DDD (Python): pas pertinent
  ddd_generic_crud_usage: false
  ddd_direct_event_publish: false
  # Fleet WebSocket EntityStore: pas pertinent
  websocket_event_mapping_incomplete: false
  cache_invalidation_without_debounce: false
  reconnect_callback_stale_closure: false
  # DDD + pipeline: LMS n'a pas ce pattern architectural
  ddd_aggregate_void_commands: false
  ddd_result_type_usage: false
  ddd_domain_event_emission: false
  ddd_state_enum_antipattern: false
  ddd_domain_policy_location: false
  ddd_repository_event_publishing: false
  ddd_value_object_primitives: false
  ddd_application_layer_purity: false
  ddd_aggregate_immutability: false
  ddd_checkpolicies_missing: false
  use_case_pipeline: false
  validate_input_layer: false
  ddd_assert_schema_validation: false
  ddd_handle_purity: false
  ddd_hydrate_context_read_only: false
  ddd_inline_authorization: false
  ddd_frontend_data_pattern: false
  # Project structure: frontend-on-cf-worker is a CF Pages site, not a misnamed project
  required_tpb_dirs: false            # LMS already has frontend/, backend/, db/ — the check fires on frontend-on-cf-worker subdir name
  # VanillaJS frontend: LMS doesn't follow vanillajs-arborescence convention
  vanillajs_required_pages: false     # frontend/ uses its own page structure
  # DDD structural: LMS has partial DDD in application/ but legacy handlers/ coexist
  ddd_layer_first_violation: false    # backend/ mixes layer-first (domain/, infrastructure/) with BC-first (application/) — requires major refactor
  ddd_legacy_folder_names: false      # handlers/ and services/ are legacy but functional — migration to BC-first is a separate project
  ddd_controller_transport_leak: false # existing pipeline steps accept Request — refactoring all 9 use cases is a separate chantier
  ddd_controller_local_error_handling: false  # controllers have try-catch for legacy compatibility — removing requires global error handler migration
  ddd_endpoint_granularity: false     # sharing endpoints (sharedWithMe, sharedByMe, revokeShare, shareContent) use domain verbs not CRUD — intentional
  ddd_route_endpoint_naming: false    # LMS routes use action verbs (login, logout, complete, share) — legacy API contract
  ddd_ports_consolidation: false      # ports live in services/ and domain/repositories/ — consolidating to domain/ports/ is a separate refactor
  hydrate_context_isolation: false    # Execute steps do DB writes via repository.create() — DDD purist isolation not enforced in LMS
  check_policies_layer: false         # business rules in HydrateContext are access-scoping, not authz — false positive
  infrastructure_module: false        # infrastructure/ exists but lacks database/ subfolder — D1 access is via env.DB directly
  models_layer: false                 # entities live in domain/entities/ not models/ — DDD naming used
  use_case_structure: false           # application/ at backend root, not in BC subfolder — legacy structure
  ddd_inline_endpoint_bypass: false   # /api/health DB check is a health probe, not business logic
  ddd_shared_secret_auth: false       # TEST_SECRET is test-only seed endpoint, not production auth
  ddd_direct_cf_access_parsing: false # LMS uses CF Access JWT directly for auth — pre-bastion middleware pattern
  response_format: false              # application/ controllers use raw Response — legacy pattern, not worth refactoring without SDK migration
  authz_wiring_missing: false         # handlers use bastion auth middleware, not withAuthz — LMS has its own auth pattern
  audit_trail: false                  # mutation audit logging not yet implemented in LMS — tracked in TODO.md
  config_centralization: false        # byocContext.ts accesses env directly — CF Worker pattern, no config module needed
  # VanillaJS frontend structure: LMS frontend-on-cf-worker is a static site, not SPA framework
  missing_required_page: false        # frontend/ has a different structure than vanillajs-arborescence convention
  # Script documentation: scripts/ are migration/devops utilities, not user-facing CLI
  # Subprocess error handling in scripts: migration scripts handle errors contextually
  # Worker compatibility flags: frontend-on-cf-worker is a Pages project, not a Worker
  # Worker global error handler: app.onError exists but doesn't use SDK createHonoErrorHandler
  worker_global_error_handler: false  # LMS has custom onError handler at line 70 — SDK migration is separate
  # Missing filter files: LMS pipeline doesn't use Filter step yet — all endpoints return full data
  # Function duplication: showToast is intentionally colocated in debug modules
  # Duplicate code in handlers: glossary and translations share URL construction pattern
  duplicate_code_handlers: false      # similar fetch patterns in glossary/translation handlers — not worth extracting
  # God file: zod is a shared validation library, high import count is expected
  god_file: false                     # zod imported by 8 files — it's a validation library, high coupling is expected
  # Naming convention: 'output' vs 'outputs' is a false positive on filter return values
  # Positional args: pipeline function signatures are fixed by convention
  # TS dot notation: destructuring before dot access on context objects
  # Sensitive logging in check_secrets.py: this IS a secrets checker, it logs secret metadata (not values)
  # Vault token naming in scripts: setup scripts use different env vars for CF Access auth
  # Check policies layer: false positives on access-scoping in HydrateContext
  policies_layer: false               # isOwner check in HydrateContext is data-scoping, not authz
  # Optional chaining: LMS uses ?. pervasively — destructuring with defaults would be a massive refactor with no functional gain
  # Entity pattern serialization: LMS entities are DDD-lite, no toSnapshot needed yet
  ddd_entity_pattern: false           # 4 entity classes without serialization — they use plain objects
  # Barrel zero-logic: LMS service barrels contain factory functions — intentional colocation
  ddd_barrel_zero_logic: false        # 3 barrel files with factory definitions — splitting would add complexity
  # CSS rigid grid: LMS uses fixed column grids intentionally for admin/badges layouts
  css_rigid_grid_columns: false       # 2 grids — admin dashboard and badges grid have fixed layouts by design
  # innerHTML for modals: LMS uses innerHTML for one-time modal renders — safe, no user input
  innerHTML_view_switching: false     # endScreen.js uses innerHTML for static modal content
  # ACK suppress wave: false positive on legitimate ACK patterns
  # ── Opt-OUT (visible + reviewed, per § ENTROPY ZÉRO OPT-IN) — same precedent as
  # tpb-it-ops. tpb-lms uses DIRECT relative `.js`-extension ESM imports as its
  # established convention (Node/Workers ESM requires the extension), NOT the
  # index.ts barrel-only style. The barrel checks flag the ENTIRE import graph
  # (~480 imports) — an opinionated code-organisation preference, not a
  # correctness/security invariant. Converting to barrels = churn without value.
  direct_import: false
  barrel_imports: false
  barrel_import_bypass: false
  # cf_abstraction: services access `env.DB.prepare(...)` / `db: D1Database`
  # directly. This is the SAME architectural decision already carved out above
  # via `infrastructure_module: false` ("D1 access is via env.DB directly") and
  # `config_centralization: false` ("CF Worker pattern"). tpb-lms deliberately
  # does not interpose a repository-port abstraction between services and D1 —
  # introducing one is a separate multi-day refactor, not a correctness fix.
  cf_abstraction: false
  # cli_script_documentation: scripts/skool-import + scripts/masterclass-import
  # are one-off data-migration importers (not user-facing CLIs with argparse) —
  # same "scripts/ are migration/devops utilities" carve-out class noted above.
  cli_script_documentation: false
  # contracts_canonical_location: tpb-lms is a self-contained MONOLITH (not part
  # of the per-BC contracts-package convention). Its Zod event-validation schemas
  # live in backend/schemas/ (the app SSOT, "Zod via ESM, zero node_modules") —
  # there is no @the-play-button/tpb-lms-contracts package to move them into, and
  # creating one for 3 event schemas is overkill for a legacy monolith.
  contracts_canonical_location: false
  # naming_convention: FP-prone heuristic on collective nouns / past-participles
  # (the project already documents naming FPs above: 'output vs outputs'). The
  # residual findings are  (a standard collective noun + an API response
  # field read by frontend-on-cf-worker cls.media — un-renameable), plus borderline
  # / locals. Not a correctness invariant.
  naming_convention: false

# Project-specific exceptions
exceptions:
  # ── Situation 3 carve-out — legacy nested use-case grouping (2026-06-24) ──
  # tpb-lms uses `application/{group}/{useCase}/` grouping.
  # `cloudContent/{getCloudContent,getCloudPitch}/`,
  # `sharing/{createShare,deleteShare,listPermissions,listSharedByMe,listSharedWithMe}/`,
  # `connections/{getDefaultConnection,listConnections}/`,
  # `classes/{createClass,updateClass,deleteClass}/`,
  # `courses/{createCourse,updateCourse,deleteCourse}/` are GROUPING dirs holding
  # several real use cases. Each inner use case already has its canonical 9-step
  # pipeline. Flattening + `.types/` extraction is a multi-day structural refactor.
  # Scope = the grouping dirs only (= the inner use cases are NOT checked by
  # `usecase_types_subfolder_named` per its single-level iteration).
  usecase_types_subfolder_named:
    - backend/lms/application/cloudContent
    - backend/lms/application/sharing
    - backend/lms/application/connections
    - backend/lms/application/classes
    - backend/lms/application/courses

  # Files allowed to have high coupling (entry points, orchestrators)
  coupling:
    - backend/index.js
  
  # Files expected to be "god files" (shared utilities by design)
  god_files:
    - backend/cors.js           # CORS config used everywhere
    - zod                       # Validation library — high import count is expected
    - "@the-play-button/tpb-sdk-js"  # SDK imported across many modules by design
  
  # Entry points that are always "used" for dead code detection
  entry_points:
    - backend/index.js

  # DDD pipeline + domain modules export function + type or multiple related exports
  multiple_exports:
    - backend/
    - frontend-on-cf-worker/
  console_leaks:
    - frontend-on-cf-worker/  # Frontend files use console.error for client-side error reporting
    - scripts/           # Utility scripts use console for output
    # ── Situation 3 carve-out — last-resort stderr fallback (2026-06-24) ──
    # `backend/index.js` line 105 is the catch block of `configureLogger()`
    # itself failing during the first-request lazy init (= can't `log.error()`
    # because the SDK logger is the very thing that just threw). Per
    # § ALWAYS FAIL HARD the failure must surface to the CF Worker tail
    # log stream — stderr is the only path before the logger is wired.
    # Scope = single bootstrap catch block in backend/index.js.
    - backend/index.js

  # ── Plan 2026-06-11 retire-entropy-acks-cross-portfolio bulk strip ──
  python_magic_numbers:
    - path: ""
      reason: "Plan 2026-06-11 bulk strip — pattern systemic per § ENTROPY cas 3"
  positional_args_excess:
    - path: ""
      reason: "Plan 2026-06-11 bulk strip — pattern systemic per § ENTROPY cas 3"
  class_method_length:
    - path: ""
      reason: "Plan 2026-06-11 bulk strip — pattern systemic per § ENTROPY cas 3"
  catch_return_default:
    - path: ""
      reason: "Plan 2026-06-11 bulk strip — pattern systemic per § ENTROPY cas 3"
  multiple_exports:
    - path: ""
      reason: "Plan 2026-06-11 bulk strip — pattern systemic per § ENTROPY cas 3"

  # ── 2026-06-24 Situation 3 carve-out (= file deleted, history retained) ──
  # File `test_quiz_scoring.js` was deleted in commit a212858 (= dead ad-hoc
  # test, zero consumers). Gitleaks continues to scan git history per § JAMAIS
  # DE filter-repo, and re-detects 4 FR-language quiz answer strings + person
  # names ("Excellence, Confiance, Engagement", "Innovation, Qualité, Service",
  # "Julien CORNILLON", "Mai KUROKAWA") as generic API keys via Shannon entropy
  # — these are TRUE false positives, not real secrets. Working tree is clean.
  # Exception scope = single deleted path. Per CLAUDE.md § ENTROPY 3 SITUATIONS
  # Situation 3 « checker correct + legitimate file-specific reason ».
  mega-gitleaks-generic-api-key:
    - test_quiz_scoring.js

  # ── 2026-06-24 Situation 3 carve-out (= Worker SPA root entry) ──
  # `frontend-on-cf-worker/index.html` is the SINGLE-page-application root
  # served by a Cloudflare Worker (`[assets] directory = "./"` in
  # `frontend-on-cf-worker/wrangler.toml`). The VanillaJS doctrine
  # `frontend/pages/[name]/index.html` is multi-page convention — tpb-lms is
  # explicitly Worker-SPA (= same family carve-out as `required_tpb_dirs` and
  # `vanillajs_required_pages` already opted-out above). Moving the file
  # would require re-configuring the CF Worker assets binding + rewriting
  # every relative `<script src="...">` path. Scope = single SPA root.
  html_wrong_location:
    - frontend-on-cf-worker/index.html

  # ── 2026-06-24 Situation 3 carve-out (= Python 3.4.3+ SSL doctrine) ──
  # `scripts/devops/verify_deploy.py` migrated from `urllib.request` to
  # `http.client.HTTPSConnection` (Plan 05) per § CF ACCESS doctrine. The
  # semgrep `httpsconnection-detected` rule warns about pre-Python-3.4.3
  # SSL verification defaults — our code explicitly creates an
  # `ssl.create_default_context()` (= verification enabled by default).
  # All TPB CI runners + dev containers run Python ≥ 3.11. Scope = single
  # devops verification script. Same pattern is used cross-portfolio in
  # tpb-cock's `doctor_framework.py` + `_forgejo_client.py`.
  mega-semgrep-python-lang-security-audit-httpsconnection-detected:
    - scripts/devops/verify_deploy.py
